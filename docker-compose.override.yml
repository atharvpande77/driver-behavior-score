services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    volumes:
      - .:/app
      -  /app/.venv
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/.venv
    env_file:
      - .env
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src"